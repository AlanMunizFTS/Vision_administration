services:
  vision-api:
    build:
      context: .
    container_name: vision_administration_api
    env_file:
      - .env
    environment:
      DB_HOST: ${API_DB_HOST:-host.docker.internal}
      DB_PORT: ${API_DB_PORT:-5432}
    ports:
      - "${API_PORT:-8000}:8000"
    volumes:
      - ./reports:/app/reports
    restart: unless-stopped

  vision-web:
    build:
      context: ./frontend
    container_name: vision_administration_web
    depends_on:
      - vision-api
    ports:
      - "${WEB_PORT:-3000}:80"
    restart: unless-stopped
